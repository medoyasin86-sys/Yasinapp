<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المخطط الرقمي الاحترافي | 2026-2027</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --paper-texture: #fdfaf3;
            --ink: #3d3d3d;
            --gold-leaf: #a68b5a;
            --sidebar-dark: #362e26;
            --lines: #e0ddd5;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            font-family: 'Amiri', serif;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* حاوية الأجندة - أبعاد iPad 10.2 المحددة */
        .planner-frame {
            width: 1024px;
            height: 768px;
            background-color: var(--paper-texture);
            display: flex;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-radius: 5px;
            border-left: 12px solid #2a241e;
        }

        /* شريط التبويبات الاحترافي */
        .tabs-nav {
            width: 75px;
            background-color: var(--sidebar-dark);
            display: flex;
            flex-direction: column;
            padding-top: 40px;
            gap: 2px;
            z-index: 10;
        }

        .tab {
            padding: 20px 5px;
            color: #c5b8a5;
            text-align: center;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            border-right: 4px solid transparent;
            background: rgba(255,255,255,0.03);
        }

        .tab.active, .tab:hover {
            background: var(--paper-texture);
            color: var(--gold-leaf);
            border-right: 4px solid var(--gold-leaf);
        }

        /* الصفحة الرئيسية */
        .page-content {
            flex: 1;
            padding: 40px 60px;
            position: relative;
            background-image: linear-gradient(var(--lines) 1px, transparent 1px);
            background-size: 100% 32px;
            line-height: 32px;
            display: flex;
            flex-direction: column;
        }

        /* ترويسة كلاسيكية */
        header {
            border-bottom: 2px double var(--gold-leaf);
            margin-bottom: 30px;
            text-align: center;
            padding-bottom: 10px;
        }

        header h1 {
            margin: 0; font-size: 3rem; color: var(--gold-leaf);
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05);
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            flex: 1;
        }

        /* مساحة الكتابة */
        .writing-area h3 { color: var(--gold-leaf); margin: 0 0 10px 0; font-style: italic; }
        
        textarea {
            width: 100%; height: 100%;
            background: transparent; border: none; outline: none;
            font-family: 'Amiri', serif; font-size: 1.5rem;
            color: var(--ink); resize: none; line-height: 32px;
        }

        /* صناديق التخطيط الجانبية */
        .planner-widgets { display: flex; flex-direction: column; gap: 25px; }

        .widget {
            border: 1px solid var(--gold-leaf);
            background: rgba(255,255,255,0.4);
            padding: 15px;
            position: relative;
        }

        .widget::after {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 5px; background: var(--gold-leaf);
        }

        /* قصاصات وجماليات */
        .washi-tape {
            position: absolute; top: 20px; right: 15%;
            width: 140px; height: 35px;
            background: rgba(166, 139, 90, 0.3);
            transform: rotate(-2deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
            pointer-events: none;
        }

        .wax-seal {
            position: absolute; bottom: 40px; left: 50px;
            width: 100px; height: 100px;
            background: radial-gradient(#b03a2e, #8e2a20);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #f1c40f; box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            transform: rotate(12deg); font-weight: bold; font-size: 0.9rem;
            text-align: center; border: 2px solid rgba(0,0,0,0.1);
        }

        footer {
            text-align: center; font-size: 0.8rem; color: #aaa;
            margin-top: 20px; font-style: italic;
        }

    </style>
</head>
<body>

    <div class="planner-frame">
        <!-- التبويبات -->
        <nav class="tabs-nav">
            <div class="tab active" onclick="updatePage('main')">الرئيسية</div>
            <div class="tab" onclick="updatePage('2026')">٢٠٢٦ السنوية</div>
            <div class="tab" onclick="updatePage('2027')">٢٠٢٧ السنوية</div>
            <div class="tab" onclick="updatePage('thoughts')">خواطر وأفكار</div>
            <div class="tab" onclick="updatePage('goals')">مخططات حياتية</div>
        </nav>

        <!-- المحتوى -->
        <main class="page-content">
            <div class="washi-tape"></div>
            
            <header>
                <h1 id="main-title">أجندة الذكريات والخطط</h1>
                <p id="sub-title" style="color: #888; margin: 0;">الإصدار الكامل الفاخر ٢٠٢٦-٢٠٢٧</p>
            </header>

            <div class="layout-grid">
                <section class="writing-area">
                    <h3 id="section-label">فيضُ الخاطر اليوم ...</h3>
                    <textarea id="editor" placeholder="ابدأ بكتابة رؤيتك هنا..."></textarea>
                </section>

                <aside class="planner-widgets">
                    <div class="widget">
                        <strong style="color: var(--gold-leaf);">أولويات اليوم:</strong>
                        <div style="height: 120px; margin-top: 10px; border-bottom: 1px dashed var(--lines);"></div>
                        <div style="height: 120px; margin-top: 10px;"></div>
                    </div>
                    <div class="widget">
                        <strong style="color: var(--gold-leaf);">اقتباس ملهم:</strong>
                        <p id="quote" style="font-style: italic; font-size: 1.1rem; line-height: 1.5; color: #555;">
                            "أفضل طريقة للتنبؤ بالمستقبل هي اختراعه."
                        </p>
                    </div>
                </aside>
            </div>

            <div class="wax-seal">حصري<br>٢٠٢٦-٢٠٢٧</div>
            <footer>تم التصميم ليناسب الكتابة الإبداعية على أجهزة الآيباد</footer>
        </main>
    </div>

    <script>
        function updatePage(page) {
            const title = document.getElementById('main-title');
            const sub = document.getElementById('sub-title');
            const label = document.getElementById('section-label');
            const quote = document.getElementById('quote');
            const tabs = document.querySelectorAll('.tab');

            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if(page === '2026') {
                title.innerText = 'تقويم عام ٢٠٢٦';
                sub.innerText = 'سنة الإنجازات والطموح';
                label.innerText = 'أهداف العام الرئيسية:';
                quote.innerText = '"اجعل من ٢٠٢٦ عاماً لا يُنسى."';
            } else if(page === '2027') {
                title.innerText = 'تقويم عام ٢٠٢٧';
                sub.innerText = 'سنة الحصاد والتوسع';
                label.innerText = 'رؤية العام القادم:';
                quote.innerText = '"الاستمرارية هي سر النجاح العظيم."';
            } else if(page === 'thoughts') {
                title.innerText = 'مساحة التأمل';
                sub.innerText = 'أفرغ ما في قلبك وعقلك';
                label.innerText = 'بوح قلم ...';
                quote.innerText = '"الكتابة هي مرآة الروح."';
            } else if(page === 'goals') {
                title.innerText = 'مخططات حياتية';
                sub.innerText = 'هندسة المسار الشخصي';
                label.innerText = 'خطوات عملية للتنفيذ:';
                quote.innerText = '"الخطة الجيدة اليوم أفضل من الخطة المثالية غداً."';
            } else {
                title.innerText = 'أجندة الذكريات والخطط';
                sub.innerText = 'الإصدار الكامل الفاخر ٢٠٢٦-٢٠٢٧';
                label.innerText = 'فيضُ الخاطر اليوم ...';
            }
        }
    </script>
</body>
</html>
