<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 نظامي المالي</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            min-height: 100vh; 
            padding: 20px; 
            color: #333;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px; 
            padding: 20px;
        }
        .header h1 { 
            font-size: 2.5em; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p { color: #a0a0a0; font-size: 1.1em; }
        
        .wallets { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .wallet { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 25px 15px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .wallet:hover { transform: translateY(-5px); }
        .wallet h3 { 
            color: #555; 
            margin-bottom: 15px; 
            font-size: 1.2em;
        }
        .wallet .amount { 
            font-size: 2em; 
            font-weight: bold; 
            color: #27ae60;
            margin: 10px 0;
        }
        .wallet .currency { 
            color: #888; 
            font-size: 0.9em;
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .card h2 { 
            color: #2c3e50; 
            margin-bottom: 25px; 
            border-bottom: 3px solid #3498db; 
            padding-bottom: 15px;
            font-size: 1.5em;
        }
        
        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
        }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #555; 
            font-size: 0.95em;
        }
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { 
            border-color: #3498db; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.4);
        }
        .btn-danger { 
            background: linear-gradient(135deg, #e74c3c, #c0392b); 
            color: white; 
        }
        .btn-danger:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(231,76,60,0.4);
        }
        .btn-success { 
            background: linear-gradient(135deg, #27ae60, #1e8449); 
            color: white; 
        }
        
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
        }
        .tab { 
            flex: 1; 
            padding: 18px; 
            background: rgba(255,255,255,0.15); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        .tab:hover { background: rgba(255,255,255,0.25); }
        .tab.active { 
            background: white; 
            color: #1a1a2e;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .hidden { display: none; }
        
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            align-items: center;
            transition: background 0.2s;
        }
        .list-item:hover { background: #f8f9fa; }
        .list-item:last-child { border-bottom: none; }
        
        .income { color: #27ae60; font-weight: bold; font-size: 1.1em; }
        .expense { color: #e74c3c; font-weight: bold; font-size: 1.1em; }
        .badge { 
            background: linear-gradient(135deg, #f39c12, #e67e22); 
            color: white; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 12px;
            font-weight: bold;
        }
        
        .date-display { 
            color: #7f8c8d; 
            font-size: 13px; 
            margin-top: 5px;
        }
        
        .debt-on-me { border-right: 5px solid #e74c3c; }
        .debt-on-them { border-right: 5px solid #27ae60; }
        
        .empty { 
            text-align: center; 
            color: #999; 
            padding: 40px;
            font-size: 1.1em;
        }
        
        .delete-btn { 
            background: #e74c3c; 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 8px; 
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #c0392b; transform: scale(1.05); }
        
        .settle-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.2s;
        }
        .settle-btn:hover { background: #1e8449; transform: scale(1.05); }
        
        .status-settled { color: #27ae60; font-weight: bold; }
        
        @media (max-width: 600px) {
            .wallets { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 نظامي المالي</h1>
            <p>إدارة الدخل والمديونيات - QNB | مسقط | دخل إضافي</p>
        </div>

        <!-- المحافظ -->
        <div class="wallets">
            <div class="wallet">
                <h3>🏦 بنك QNB</h3>
                <div class="amount" id="qnb-bal">0.00</div>
                <div class="currency">جنيه مصري (EGP)</div>
            </div>
            <div class="wallet">
                <h3>🏛️ بنك مسقط</h3>
                <div class="amount" id="muscat-bal">0.00</div>
                <div class="currency">ريال عماني (OMR)</div>
            </div>
            <div class="wallet">
                <h3>💼 دخل إضافي</h3>
                <div class="amount" id="extra-bal">0.00</div>
                <div class="currency">دولار (USD)</div>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('trans')">📊 العمليات المالية</button>
            <button class="tab" onclick="showTab('debts')">⚠️ المديونيات</button>
        </div>

        <!-- قسم العمليات -->
        <div id="trans" class="card">
            <h2>➕ تسجيل عملية جديدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>نوع العملية</label>
                    <select id="t-type">
                        <option value="income">💵 دخل (+)</option>
                        <option value="expense">💸 مصروف (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المحفظة</label>
                    <select id="t-wallet">
                        <option value="qnb">🏦 QNB</option>
                        <option value="muscat">🏛️ مسقط</option>
                        <option value="extra">💼 دخل إضافي</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="t-amount" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>العملة</label>
                    <select id="t-currency">
                        <option value="EGP">🇪🇬 جنيه مصري</option>
                        <option value="OMR">🇴🇲 ريال عماني</option>
                        <option value="USD">🇺🇸 دولار أمريكي</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف / التفاصيل</label>
                <input type="text" id="t-desc" placeholder="مثال: راتب شهر يونيو">
            </div>
            <button class="btn btn-primary" onclick="addTrans()">💾 حفظ العملية</button>

            <div id="trans-list" style="margin-top: 30px;">
                <h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل العمليات</h3>
                <div class="empty">لا توجد عمليات مسجلة بعد</div>
            </div>
        </div>

        <!-- قسم المديونيات -->
        <div id="debts" class="card hidden">
            <h2>⚠️ تسجيل مديونية جديدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>اسم الشخص</label>
                    <input type="text" id="d-person" placeholder="مثال: أحمد محمد">
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="d-amount" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>العملة</label>
                    <select id="d-currency">
                        <option value="EGP">🇪🇬 جنيه مصري</option>
                        <option value="OMR">🇴🇲 ريال عماني</option>
                        <option value="USD">🇺🇸 دولار أمريكي</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>نوع المديونية</label>
                    <select id="d-type">
                        <option value="on-me">🔴 عليا (أنا مدين له)</option>
                        <option value="on-them">🟢 ليا (هو مدين لي)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف / التفاصيل</label>
                <input type="text" id="d-desc" placeholder="مثال: قرض شخصي">
            </div>
            <button class="btn btn-danger" onclick="addDebt()">💾 حفظ المديونية</button>

            <div id="debt-list" style="margin-top: 30px;">
                <h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل المديونيات</h3>
                <div class="empty">لا توجد مديونيات مسجلة بعد</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════
        // ⚠️ هنا تضع إعدادات Firebase الخاصة بك
        // استبدل هذه القيم بقيمك من Firebase Console
        // ═══════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // ═══════════════════════════════════════════════════════
        // ⚠️ هام جداً: قواعد الأمان (Rules) في Firebase
        // اذهب إلى Firebase Console > Realtime Database > Rules
        // والصق هذه القواعد:
        /*
        {
          "rules": {
            ".read": true,
            ".write": true
          }
        }
        */
        // ⚠️ تحذير: هذا للاستخدام الشخصي فقط!
        // ═══════════════════════════════════════════════════════

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const transRef = db.ref('transactions');
        const debtsRef = db.ref('debts');

        const symbols = { EGP: 'ج.م', OMR: 'ر.ع', USD: '$' };
        const walletNames = { qnb: 'QNB', muscat: 'مسقط', extra: 'دخل إضافي' };

        // تبديل التبويبات
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('trans').classList.toggle('hidden', tab !== 'trans');
            document.getElementById('debts').classList.toggle('hidden', tab !== 'debts');
        }

        // الحصول على التاريخ والوقت الحالي
        function getDateTime() {
            const now = new Date();
            return now.toLocaleString('ar-EG', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // إضافة عملية مالية
        function addTrans() {
            const type = document.getElementById('t-type').value;
            const wallet = document.getElementById('t-wallet').value;
            const amount = parseFloat(document.getElementById('t-amount').value);
            const currency = document.getElementById('t-currency').value;
            const desc = document.getElementById('t-desc').value.trim();

            if (!amount || amount <= 0) {
                alert('⚠️ الرجاء إدخال مبلغ صحيح أكبر من صفر');
                return;
            }

            const transaction = {
                type: type,
                wallet: wallet,
                amount: amount,
                currency: currency,
                description: desc || 'بدون وصف',
                date: getDateTime(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            transRef.push(transaction)
                .then(() => {
                    document.getElementById('t-amount').value = '';
                    document.getElementById('t-desc').value = '';
                    showNotification('✅ تم حفظ العملية بنجاح!');
                })
                .catch(err => {
                    alert('❌ خطأ: ' + err.message);
                });
        }

        // إضافة مديونية
        function addDebt() {
            const person = document.getElementById('d-person').value.trim();
            const amount = parseFloat(document.getElementById('d-amount').value);
            const currency = document.getElementById('d-currency').value;
            const type = document.getElementById('d-type').value;
            const desc = document.getElementById('d-desc').value.trim();

            if (!person) {
                alert('⚠️ الرجاء إدخال اسم الشخص');
                return;
            }
            if (!amount || amount <= 0) {
                alert('⚠️ الرجاء إدخال مبلغ صحيح');
                return;
            }

            const debt = {
                person: person,
                amount: amount,
                currency: currency,
                type: type,
                description: desc || 'بدون وصف',
                date: getDateTime(),
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: 'active'
            };

            debtsRef.push(debt)
                .then(() => {
                    document.getElementById('d-person').value = '';
                    document.getElementById('d-amount').value = '';
                    document.getElementById('d-desc').value = '';
                    showNotification('✅ تم حفظ المديونية بنجاح!');
                })
                .catch(err => {
                    alert('❌ خطأ: ' + err.message);
                });
        }

        // حذف عملية
        function deleteTrans(id) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذه العملية؟')) {
                transRef.child(id).remove();
            }
        }

        // حذف مديونية
        function deleteDebt(id) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذه المديونية؟')) {
                debtsRef.child(id).remove();
            }
        }

        // تسوية مديونية
        function settleDebt(id) {
            if (confirm('✓ تأكيد تسوية هذه المديونية؟')) {
                debtsRef.child(id).update({ 
                    status: 'settled',
                    settledDate: getDateTime()
                });
            }
        }

        // إشعار مؤقت
        function showNotification(msg) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                background: #27ae60; color: white; padding: 15px 30px;
                border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                z-index: 1000; font-weight: bold;
            `;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // تحديث الأرصدة والقائمة
        transRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // حساب الأرصدة
            const balances = { qnb: 0, muscat: 0, extra: 0 };
            
            Object.values(data).forEach(t => {
                const val = t.type === 'income' ? t.amount : -t.amount;
                balances[t.wallet] += val;
            });

            document.getElementById('qnb-bal').textContent = balances.qnb.toFixed(2);
            document.getElementById('muscat-bal').textContent = balances.muscat.toFixed(2);
            document.getElementById('extra-bal').textContent = balances.extra.toFixed(2);

            // عرض القائمة
            const list = document.getElementById('trans-list');
            const entries = Object.entries(data);
            
            if (entries.length === 0) {
                list.innerHTML = `
                    <h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل العمليات</h3>
                    <div class="empty">لا توجد عمليات مسجلة بعد</div>
                `;
                return;
            }

            // ترتيب حسب التاريخ (الأحدث أولاً)
            entries.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            let html = '<h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل العمليات</h3>';
            
            entries.forEach(([id, t]) => {
                const cls = t.type === 'income' ? 'income' : 'expense';
                const sign = t.type === 'income' ? '+' : '-';
                const icon = t.type === 'income' ? '💵' : '💸';
                
                html += `
                    <div class="list-item">
                        <div style="flex: 1;">
                            <div style="font-size: 1.05em;">
                                <strong>${icon} ${walletNames[t.wallet]}</strong> - ${t.description}
                            </div>
                            <div class="date-display">📅 ${t.date}</div>
                        </div>
                        <div style="text-align: left; display: flex; align-items: center; gap: 10px;">
                            <span class="${cls}">${sign}${t.amount.toFixed(2)} ${symbols[t.currency]}</span>
                            <span class="badge">${t.currency}</span>
                            <button class="delete-btn" onclick="deleteTrans('${id}')" title="حذف">🗑️</button>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        });

        // تحديث قائمة المديونيات
        debtsRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const list = document.getElementById('debt-list');
            const entries = Object.entries(data);
            
            if (entries.length === 0) {
                list.innerHTML = `
                    <h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل المديونيات</h3>
                    <div class="empty">لا توجد مديونيات مسجلة بعد</div>
                `;
                return;
            }

            entries.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            let html = '<h3 style="margin-bottom: 20px; color: #2c3e50;">📋 سجل المديونيات</h3>';
            
            entries.forEach(([id, d]) => {
                const cls = d.type === 'on-me' ? 'debt-on-me' : 'debt-on-them';
                const txt = d.type === 'on-me' ? '🔴 عليا' : '🟢 ليا';
                const color = d.type === 'on-me' ? '#e74c3c' : '#27ae60';
                
                html += `
                    <div class="list-item ${cls}">
                        <div style="flex: 1;">
                            <div style="font-size: 1.05em;">
                                <strong style="color: ${color}">${txt}</strong> - ${d.person}
                            </div>
                            <div style="font-size: 0.9em; color: #666; margin-top: 3px;">${d.description}</div>
                            <div class="date-display">📅 ${d.date}</div>
                        </div>
                        <div style="text-align: left; display: flex; align-items: center; gap: 8px;">
                            <span style="font-weight: bold; font-size: 1.1em;">
                                ${d.amount.toFixed(2)} ${symbols[d.currency]}
                            </span>
                            <span class="badge">${d.currency}</span>
                            ${d.status === 'active' 
                                ? `<button class="settle-btn" onclick="settleDebt('${id}')" title="تسوية">✓</button>
                                   <button class="delete-btn" onclick="deleteDebt('${id}')" title="حذف">🗑️</button>`
                                : '<span class="status-settled">✓ تم التسوية</span>'
                            }
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        });
    </script>
</body>
</html>
