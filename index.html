<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجندة 2026 الرقمية | My Digital Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #7e9a9a;
            --accent-color: #d4a373;
            --bg-color: #fefae0;
            --paper-color: #ffffff;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 80px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        nav button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 10px 5px;
        }

        nav button:hover, nav button.active {
            background-color: var(--accent-color);
            border-radius: 5px;
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .notebook-page {
            background: var(--paper-color);
            min-height: 80vh;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 100% 30px;
            line-height: 30px;
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; }
        .date-badge { color: var(--accent-color); font-weight: bold; margin-bottom: 20px; display: block; }

        textarea {
            width: 100%;
            height: 600px;
            border: none;
            background: transparent;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            line-height: 30px;
            resize: none;
            outline: none;
            color: #333;
        }

        /* Grid for Life Plans */
        .grid-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            border-right: 5px solid var(--accent-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showSection('daily')" id="btn-daily" class="active">اليومية</button>
        <button onclick="showSection('thoughts')" id="btn-thoughts">خواطر</button>
        <button onclick="showSection('goals')" id="btn-goals">أهداف 2026</button>
    </nav>

    <main>
        <!-- Daily Section -->
        <section id="daily">
            <h1>مخطط اليوم</h1>
            <span class="date-badge" id="current-date"></span>
            <div class="notebook-page">
                <textarea id="daily-text" placeholder="ما هي خطتك لهذا اليوم؟..."></textarea>
            </div>
        </section>

        <!-- Thoughts Section -->
        <section id="thoughts" class="hidden">
            <h1>مساحة الأفكار والخواطر</h1>
            <div class="notebook-page">
                <textarea id="thoughts-text" placeholder="اكتب ما يجول في خاطرك هنا..."></textarea>
            </div>
        </section>

        <!-- Goals Section -->
        <section id="goals" class="hidden">
            <h1>رؤية عام 2026</h1>
            <div class="grid-plans">
                <div class="card">
                    <h3>الصحة والرياضة</h3>
                    <textarea style="height: 150px;" id="goal-health"></textarea>
                </div>
                <div class="card">
                    <h3>الجانب المهني</h3>
                    <textarea style="height: 150px;" id="goal-work"></textarea>
                </div>
                <div class="card">
                    <h3>تطوير الذات</h3>
                    <textarea style="height: 150px;" id="goal-self"></textarea>
                </div>
            </div>
        </section>
    </main>

    <script>
        // عرض التاريخ الحالي
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-EG', options);

        // وظيفة التنقل بين الأقسام
        function showSection(sectionId) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.remove('hidden');
            document.getElementById('btn-' + sectionId).classList.add('active');
        }

        // حفظ البيانات تلقائياً
        const fields = ['daily-text', 'thoughts-text', 'goal-health', 'goal-work', 'goal-self'];
        
        fields.forEach(field => {
            const element = document.getElementById(field);
            // تحميل البيانات المحفوظة
            element.value = localStorage.getItem(field) || '';
            
            // الحفظ عند الكتابة
            element.addEventListener('input', () => {
                localStorage.setItem(field, element.value);
            });
        });
    </script>
</body>
</html>
