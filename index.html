<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mo Yasin Ultimate Planner 26-27</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --royal-paper: #f9f5eb; 
            --mo-gold: #c5a059;
            --dark-leather: #2c2520;
            --line: #e4dec0;
        }

        body, html {
            margin: 0; padding: 0;
            background: #0a0a0a;
            font-family: 'Amiri', serif;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        .planner-frame {
            width: 1024px;
            height: 768px;
            background: var(--royal-paper);
            display: flex;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border-left: 15px solid var(--dark-leather);
        }

        /* نظام التبويبات الجانبي */
        .sidebar {
            width: 80px;
            background: var(--dark-leather);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            z-index: 100;
        }

        .tab {
            padding: 20px 0;
            color: #9b8a78;
            text-align: center;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            border-right: 4px solid transparent;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--royal-paper);
            color: var(--mo-gold);
            border-right: 4px solid var(--mo-gold);
        }

        /* المحتوى */
        .main-content {
            flex: 1;
            padding: 40px;
            position: relative;
            background-image: linear-gradient(var(--line) 1px, transparent 1px);
            background-size: 100% 32px;
            overflow-y: auto;
        }

        /* لوحة التقويم الكاملة */
        .calendar-grid-view {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: var(--royal-paper);
            padding: 20px;
        }

        .month-box {
            border: 1px solid var(--mo-gold);
            padding: 10px;
            text-align: center;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            font-size: 10px;
            margin-top: 10px;
        }

        .day-btn {
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
        }

        .day-btn:hover { background: var(--mo-gold); color: white; }

        /* ترويسة الصفحة اليومية */
        header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--mo-gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .writing-area {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 30px;
        }

        textarea {
            width: 100%; height: 500px;
            background: transparent; border: none; outline: none;
            font-family: 'Amiri', serif; font-size: 1.5rem;
            line-height: 32px; resize: none;
        }

        .wax-seal {
            position: absolute; bottom: 30px; left: 30px;
            width: 80px; height: 80px;
            background: radial-gradient(#9b2c2c, #5d1a1a);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d4af37; transform: rotate(5deg);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
        }

    </style>
</head>
<body>

<div class="planner-frame">
    <nav class="sidebar">
        <div class="tab" onclick="showView('cal')">تقويم السنتين</div>
        <div class="tab active" onclick="showView('daily')">اليوم الحالي</div>
        <div class="tab" onclick="showView('notes')">الخواطر</div>
    </nav>

    <main class="main-content" id="main-area">
        <!-- عرض اليوم (تلقائي) -->
        <div id="daily-view">
            <header>
                <h1 id="current-date" style="color:var(--mo-gold); margin:0;">٣ مايو ٢٠٢٦</h1>
                <div style="text-align:left; color:#888;">Mo Yasin Edition</div>
            </header>
            <div class="writing-area">
                <textarea placeholder="اكتب يومياتك هنا..."></textarea>
                <div class="widgets">
                    <div style="border:1px solid var(--mo-gold); padding:15px; margin-bottom:20px;">
                        <strong style="color:var(--mo-gold)">أولويات اليوم:</strong>
                        <div style="height:100px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- عرض التقويم الكامل للسنتين -->
        <div id="calendar-view" class="calendar-grid-view">
            <!-- سيتم توليد الشهور هنا برمجياً لضمان الدقة -->
        </div>
    </main>
    <div class="wax-seal">MO</div>
</div>

<script>
    function showView(view) {
        document.getElementById('daily-view').style.display = view === 'daily' ? 'block' : 'none';
        document.getElementById('calendar-view').style.display = view === 'cal' ? 'grid' : 'none';
    }

    // توليد تقويم السنتين
    const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    const calendarContainer = document.getElementById('calendar-view');

    function generateCalendar(year) {
        months.forEach((month, idx) => {
            const monthDiv = document.createElement('div');
            monthDiv.className = 'month-box';
            monthDiv.innerHTML = `<strong style="color:var(--mo-gold)">${month} ${year}</strong>`;
            
            const daysDiv = document.createElement('div');
            daysDiv.className = 'days-grid';
            for(let i=1; i<=30; i++) { // تبسيط لأغراض العرض
                daysDiv.innerHTML += `<span class="day-btn" onclick="goToDate('${i} ${month} ${year}')">${i}</span>`;
            }
            monthDiv.appendChild(daysDiv);
            calendarContainer.appendChild(monthDiv);
        });
    }

    function goToDate(dateStr) {
        document.getElementById('current-date').innerText = dateStr;
        showView('daily');
    }

    generateCalendar(2026);
    generateCalendar(2027);
</script>

</body>
</html>
