<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<div style="margin: 20px 0; text-align: center;">
    <button id="export-btn" onclick="exportReportToPDF()" style="padding: 10px 25px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: sans-serif; font-size: 16px;">
        تصدير التقرير إلى PDF
    </button>
</div>

<div id="print-section" style="background: #ffffff; padding: 30px; box-sizing: border-box; direction: rtl;">
    
    <h2 style="text-align: center; color: #333;">تقرير النظام البرمجي الشامل</h2>
    <hr>
    <p>جاري سحب البيانات الديناميكية وتوليد الجداول...</p>
    </div>

<script>
async function exportReportToPDF() {
    // تحديد العنصر المستهدف للطباعة
    const element = document.getElementById('print-section');
    const btn = document.getElementById('export-btn');
    
    if (!element) {
        console.error("خطأ حرج: لم يتم العثور على القسم المعرف بـ 'print-section'");
        alert("عذراً، لم يتم العثور على قسم التقارير في النظام.");
        return;
    }

    // تغيير حالة الزر لمنع النقرات المتعددة أثناء المعالجة
    const originalButtonText = btn ? btn.innerText : "تصدير التقرير إلى PDF";
    if (btn) {
        btn.innerText = "... جاري معالجة وتوليد الـ PDF";
        btn.disabled = true;
        btn.style.backgroundColor = "#6c757d";
    }

    try {
        // [حل جذري لتأخر البيانات] انتطار التأكد من تحميل كافة الصور بالكامل داخل التقرير
        await Promise.all(
            Array.from(element.querySelectorAll('img')).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
            })
        );

        // مهلة أمان إضافية (500 ميكروثانية) لضمان استقرار ومزامنة الـ DOM بشكل نهائي
        await new Promise(resolve => setTimeout(resolve, 500));

        // إعدادات التقاط الشاشة المتقدمة لمنع الشاشات البيضاء وحل مشاكل الـ CORS والأبعاد
        const canvasOptions = {
            scale: 2, // رفع الجودة لضمان وضوح النصوص عند الطباعة
            useCORS: true, // السماح برندرة الخطوط والصور الخارجية دون حظر أمني
            allowTaint: true,
            logging: false,
            letterRendering: true,
            windowWidth: element.scrollWidth,
            windowHeight: element.scrollHeight
        };

        // تحويل محتوى الـ HTML الحقيقي إلى Canvas بدقة عالية
        const canvas = await html2canvas(element, canvasOptions);
        const imgData = canvas.toDataURL('image/png');

        // إعدادات ملف الـ PDF وحساب المقاييس القياسية لصفحة (A4)
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 210; // عرض صفحة A4 بالمليمتر
        const pageHeight = 295; // ارتفاع صفحة A4 بالمليمتر
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight;
        let position = 0;

        // طباعة الصفحة الأولى
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
        heightLeft -= pageHeight;

        // توليد الصفحات التالية تلقائياً إذا كان التقرير طويلاً وممتداً دون قص المحتوى
        while (heightLeft >= 0) {
            position = heightLeft - imgHeight;
            pdf.addPage();
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
            heightLeft -= pageHeight;
        }

        // حفظ الملف النهائي مع وسم التاريخ الحالي للتقرير
        const dateStamp = new Date().toISOString().slice(0, 10);
        pdf.save(`تقرير_النظام_المعتمد_${dateStamp}.pdf`);

    } catch (error) {
        console.error("فشل نظام استخراج التقارير الجذري:", error);
        alert("حدث خطأ أثناء معالجة الـ PDF، يرجى التحقق من بيانات الكونسول.");
    } finally {
        // إعادة الزر إلى حالته التشغيلية الطبيعية
        if (btn) {
            btn.innerText = originalButtonText;
            btn.disabled = false;
            btn.style.backgroundColor = "#28a745";
        }
    }
}
</script>
