<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستشار المالي - إصلاح مسار المزامنة</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-color: #1a365d;
            --accent-color: #2b6cb0;
            --success-color: #2f855a;
            --danger-color: #c53030;
            --warning-color: #b7791f;
            --text-color: #2d3748;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 30px; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; }
        header h1 { color: var(--primary-color); margin: 0; }
        
        .sync-status { padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .status-online { background-color: #c6f6d5; color: #22543d; }
        .status-loading { background-color: #feebc8; color: #744210; }
        .status-error { background-color: #fed7d7; color: #822727; }

        .wallets-container { margin-bottom: 30px; }
        .wallet-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: var(--primary-color); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 6px solid #cbd5e0; }
        .card h3 { margin: 0 0 10px 0; color: #4a5568; font-size: 1.1rem; }
        .currency-item { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }

        .muscat { border-right-color: #d32f2f; }
        .qnb { border-right-color: #002469; }
        .extra { border-right-color: var(--success-color); }
        .debts { border-right-color: var(--danger-color); }

        .main-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 992px) { .main-layout { grid-template-columns: 1fr; } }

        .form-section, .list-section, .summary-section { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }

        button.submit-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button.submit-btn:hover { background-color: #102a43; }
        button.submit-btn:disabled { background-color: #cbd5e0; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f7fafc; color: var(--primary-color); }
        .text-success { color: var(--success-color); }
        .text-danger { color: var(--danger-color); }
        .text-warning { color: var(--warning-color); }
        .delete-btn { background: none; border: none; color: var(--danger-color); cursor: pointer; font-size: 1.2rem; }

        .report-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .report-card { background: #f7fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .report-card h4 { margin: 0 0 10px 0; color: var(--primary-color); border-bottom: 1px solid #cbd5e0; padding-bottom: 5px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>نظام المحافظ السحابي - إصلاح المزامنة</h1>
            <p>مزامنة فورية (في حال عدم وجود عقد فارغة)</p>
        </div>
        <div id="sync-indicator" class="sync-status status-loading">🔄 جاري محاولة الاتصال بالسحابة...</div>
    </header>

    <div class="wallets-container">
        <div class="wallet-title">📊 الأرصدة الحالية في المحافظ (تحديث تلقائي)http://googleusercontent.com/image_generation_content/0
