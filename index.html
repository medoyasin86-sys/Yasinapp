<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 نظامي المالي</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        
        .wallets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .wallet { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .wallet h3 { color: #555; margin-bottom: 10px; font-size: 1.1em; }
        .wallet .amount { font-size: 1.8em; font-weight: bold; color: #27ae60; }
        .wallet .currency { color: #888; font-size: 0.9em; }
        
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: white; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab.active { background: white; color: #667eea; }
        
        .hidden { display: none; }
        
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .list-item:hover { background: #f8f9fa; }
        .income { color: #27ae60; font-weight: bold; }
        .expense { color: #e74c3c; font-weight: bold; }
        .badge { background: #f39c12; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        
        .date-display { color: #7f8c8d; font-size: 13px; }
        
        .debt-on-me { border-right: 4px solid #e74c3c; }
        .debt-on-them { border-right: 4px solid #27ae60; }
        
        .empty { text-align: center; color: #999; padding: 30px; }
        
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 نظامي المالي</h1>
            <p>إدارة الدخل والمديونيات</p>
        </div>

        <div class="wallets">
            <div class="wallet">
                <h3>🏦 QNB</h3>
                <div class="amount" id="qnb-bal">0</div>
                <div class="currency">جنيه مصري</div>
            </div>
            <div class="wallet">
                <h3>🏛️ مسقط</h3>
                <div class="amount" id="muscat-bal">0</div>
                <div class="currency">ريال عماني</div>
            </div>
            <div class="wallet">
                <h3>💼 إضافي</h3>
                <div class="amount" id="extra-bal">0</div>
                <div class="currency">دولار</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('trans')">📊 العمليات</button>
            <button class="tab" onclick="showTab('debts')">⚠️ المديونيات</button>
        </div>

        <!-- العمليات -->
        <div id="trans" class="card">
            <h2>➕ عملية جديدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>النوع</label>
                    <select id="t-type">
                        <option value="income">دخل (+)</option>
                        <option value="expense">مصروف (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المحفظة</label>
                    <select id="t-wallet">
                        <option value="qnb">QNB</option>
                        <option value="muscat">مسقط</option>
                        <option value="extra">دخل إضافي</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="t-amount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>العملة</label>
                    <select id="t-currency">
                        <option value="EGP">جنيه مصري</option>
                        <option value="OMR">ريال عماني</option>
                        <option value="USD">دولار</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <input type="text" id="t-desc" placeholder="وصف العملية...">
            </div>
            <button class="btn btn-primary" onclick="addTrans()">💾 حفظ العملية</button>

            <div id="trans-list" style="margin-top: 25px;">
                <h3 style="margin-bottom: 15px;">📋 السجل</h3>
                <div class="empty">لا توجد عمليات</div>
            </div>
        </div>

        <!-- المديونيات -->
        <div id="debts" class="card hidden">
            <h2>⚠️ مديونية جديدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>الشخص</label>
                    <input type="text" id="d-person" placeholder="اسم الشخص">
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="d-amount" placeholder="0.00" step="0.01">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>العملة</label>
                    <select id="d-currency">
                        <option value="EGP">جنيه مصري</option>
                        <option value="OMR">ريال عماني</option>
                        <option value="USD">دولار</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>النوع</label>
                    <select id="d-type">
                        <option value="on-me">🔴 عليا (أدفع له)</option>
                        <option value="on-them">🟢 ليا (يدفع لي)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف</label>
