<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة الذكية - إدارة المصروفات والعملات</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--text-color);
        }

        /* شبكة المحافظ الذكية */
        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border-bottom: 4px solid var(--accent-blue);
        }

        .wallet-title {
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .currency-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 3px 0;
            border-bottom: 1px dashed #334155;
        }
        .currency-line:last-child { border: none; }

        /* النموذج */
        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* الجداول */
        .logs-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        .type-إيراد { color: var(--accent-green); }
        .type-مصروف { color: var(--accent-red); }
        .type-مديونية { color: #f59e0b; }
        .type-جمعية { color: #a855f7; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 داشبورد الأرصدة والحسابات</h1>
    
    <!-- قسم المحافظ متعددة العملات -->
    <div class="wallets-grid">
        <div class="wallet-card" style="border-color: #3b82f6;">
            <div class="wallet-title">QNB</div>
            <div id="bal-qnb"></div>
        </div>
        <div class="wallet-card" style="border-color: #10b981;">
            <div class="wallet-title">MSCT</div>
            <div id="bal-msct"></div>
        </div>
        <div class="wallet-card" style="border-color: #f59e0b;">
            <div class="wallet-title">CASH</div>
            <div id="bal-cash"></div>
        </div>
        <div class="wallet-card" style="border-color: #a855f7;">
            <div class="wallet-title">EXTRA</div>
            <div id="bal-extra"></div>
        </div>
    </div>

    <!-- قسم الإدخال -->
    <div class="form-section">
        <h2>إضافة معاملة جديدة</h2>
        <form id="finance-form">
            <div class="form-row">
                <div class="form-group">
                    <label>التاريخ</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>نوع المعاملة</label>
                    <select id="type">
                        <option value="إيراد">إيراد (دخل)</option>
                        <option value="مصروف">مصروف</option>
                        <option value="مديونية">مديونية</option>
                        <option value="جمعية">جمعية</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>البيان / الوصف</label>
                <input type="text" id="description" placeholder="مثال: قسط الجمعية، راتب، عشاء" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>المحفظة المستهدفة</label>
                    <select id="wallet">
                        <option value="qnb">QNB</option>
                        <option value="msct">MSCT</option>
                        <option value="cash">Cash</option>
                        <option value="extra">Extra</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>العملة</label>
                    <select id="currency">
                        <option value="ر.ع">ريال عماني (ر.ع)</option>
                        <option value="ج.م">جنيه مصري (ج.م)</option>
                        <option value="$">دولار أمريكي ($)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="amount" step="0.001" placeholder="0.00" required>
                </div>
            </div>
            <button type="submit">حفظ العملية</button>
        </form>
    </div>

    <!-- سجل العمليات -->
    <div class="logs-section">
        <h2>سجل العمليات الأخيرة</h2>
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>البيان</th>
                    <th>النوع</th>
                    <th>المحفظة</th>
                    <th>المبلغ</th>
                    <th>العملة</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                <!-- العمليات تظهر هنا -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // تعيين تاريخ اليوم كقيمة افتراضية
    document.getElementById('date').valueAsDate = new Date();

    // جلب البيانات من الذاكرة المحلية
    let transactions = JSON.parse(localStorage.getItem('my_expenses_v2')) || [];

    // هيكل تخزين الأرصدة لكل محفظة ولكل عملة
    const walletKeys = ['qnb', 'msct', 'cash', 'extra'];
    const currencies = ['ر.ع', 'ج.م', '$'];

    function updateUI() {
        // إنشاء هيكل أرصدة صفري
        let balances = {};
        walletKeys.forEach(w => {
            balances[w] = {};
            currencies.forEach(c => balances[w][c] = 0);
        });
        
        const tbody = document.getElementById('logs-body');
        tbody.innerHTML = '';

        // الحساب الفعلي بناءً على نوع المعاملة والعملة
        transactions.forEach((t) => {
            const amt = parseFloat(t.amount);
            const curr = t.currency || 'ر.ع'; // القيمة الافتراضية إذا لم تحدد
            
            if (t.type === 'إيراد' || (t.type === 'مديونية' && amt > 0)) {
                balances[t.wallet][curr] += amt;
            } else {
                balances[t.wallet][curr] -= amt;
            }

            const row = `<tr>
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td class="type-${t.type}">${t.type}</td>
                <td>${t.wallet.toUpperCase()}</td>
                <td>${amt.toFixed(2)}</td>
                <td><strong>${curr}</strong></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // تحديث واجهة كروت المحافظ علوياً
        walletKeys.forEach(w => {
            const container = document.getElementById(`bal-${w}`);
            container.innerHTML = '';
            
            currencies.forEach(c => {
                // نعرض فقط العملات التي تحتوي على حركات مالية لتظل الواجهة نظيفة
                if(balances[w][c] !== 0 || transactions.some(t => t.wallet === w && t.currency === c)) {
                    container.innerHTML += `
                        <div class="currency-line">
                            <span>${c}</span>
                            <span>${balances[w][c].toFixed(2)}</span>
                        </div>`;
                }
            });
            
            // إذا كانت المحفظة فارغة تماماً تظهر صفر بالريال العماني كافتراضي
            if(container.innerHTML === '') {
                container.innerHTML = `
                    <div class="currency-line">
                        <span>ر.ع</span>
                        <span>0.00</span>
                    </div>`;
            }
        });
    }

    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const transaction = {
            date: document.getElementById('date').value,
            description: document.getElementById('description').value,
            type: document.getElementById('type').value,
            wallet: document.getElementById('wallet').value,
            currency: document.getElementById('currency').value,
            amount: document.getElementById('amount').value
        };

        transactions.push(transaction);
        localStorage.setItem('my_expenses_v2', JSON.stringify(transactions));
        
        updateUI();
        
        // تفريغ الحقول مع الحفاظ على المحفظة والعملة المحددة لتسهيل الإدخال المتعدد
        document.getElementById('description').value = '';
        document.getElementById('amount').value = '';
    });

    // تشغيل النظام فوراً عند فتح الصفحة
    updateUI();
</script>
</body>
</html>
