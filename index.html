<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة الذكية المحلية</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--text-color);
        }

        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border-bottom: 4px solid var(--accent-blue);
        }

        .wallet-title {
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .currency-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 3px 0;
            border-bottom: 1px dashed #334155;
        }
        .currency-line:last-child { border: none; }

        .form-section, .report-section, .logs-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
        }

        button.btn-success { background: var(--accent-green); }
        button.btn-danger { background: var(--accent-red); }
        button.btn-purple { background: var(--accent-purple); }

        .report-filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .report-summary-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .summary-item {
            padding: 10px;
            border-radius: 8px;
            background: #1e293b;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        .type-إيراد { color: var(--accent-green); }
        .type-مصروف { color: var(--accent-red); }
        .type-مديونية { color: #f59e0b; }
        .type-جمعية { color: var(--accent-purple); }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-weight: bold;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 محفظتي الرقمية (حفظ محلي آمن)</h1>
    
    <!-- قسم كروت الحسابات والمحافظ -->
    <div class="wallets-grid">
        <div class="wallet-card" style="border-color: #3b82f6;"><div class="wallet-title">QNB</div><div id="bal-qnb"></div></div>
        <div class="wallet-card" style="border-color: #10b981;"><div class="wallet-title">MSCT</div><div id="bal-msct"></div></div>
        <div class="wallet-card" style="border-color: #f59e0b;"><div class="wallet-title">CASH</div><div id="bal-cash"></div></div>
        <div class="wallet-card" style="border-color: #a855f7;"><div class="wallet-title">EXTRA</div><div id="bal-extra"></div></div>
    </div>

    <!-- قسم الإدخال -->
    <div class="form-section">
        <h2>إضافة معاملة جديدة</h2>
        <form id="finance-form">
            <div class="form-row">
                <div class="form-group"><label>التاريخ</label><input type="date" id="date" required></div>
                <div class="form-group">
                    <label>نوع المعاملة</label>
                    <select id="type">
                        <option value="إيراد">إيراد (دخل)</option>
                        <option value="مصروف">مصروف</option>
                        <option value="مديونية">مديونية</option>
                        <option value="جمعية">جمعية</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>البيان / الوصف</label><input type="text" id="description" placeholder="الوصف" required></div>
            <div class="form-row">
                <div class="form-group">
                    <label>المحفظة</label>
                    <select id="wallet">
                        <option value="qnb">QNB</option>
                        <option value="msct">MSCT</option>
                        <option value="cash">Cash</option>
                        <option value="extra">Extra</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>العملة</label>
                    <select id="currency">
                        <option value="ر.ع">ريال عماني (ر.ع)</option>
                        <option value="ج.م">جنيه مصري (ج.م)</option>
                        <option value="$">دولار أمريكي ($)</option>
                    </select>
                </div>
                <div class="form-group"><label>المبلغ</label><input type="number" id="amount" step="0.001" required></div>
            </div>
            <button type="submit" class="btn-success" style="width:100%; margin-top:10px; padding:12px;">حفظ العملية في الجهاز</button>
        </form>
    </div>

    <!-- قسم استخراج التقارير الماليّة -->
    <div class="report-section">
        <h2>📑 مركز استخراج التقارير الحسابية</h2>
        <div class="report-filters">
            <button onclick="filterReport('all')">كل البيانات</button>
            <button onclick="filterReport('today')" class="btn-purple">تقرير اليوم</button>
            <button onclick="filterReport('month')" class="btn-success">تقرير الشهر الحالي</button>
            <button onclick="exportToCSV()" class="btn-danger">📥 تحميل ملف Excel/CSV</button>
        </div>

        <div class="report-summary-box">
            <h3 style="margin-top:0; color:#cbd5e1; font-size:1rem;" id="report-title">نوع التقرير الحالي: كل البيانات</h3>
            <div class="summary-grid" id="summary-container"></div>
        </div>
    </div>

    <!-- سجل العمليات -->
    <div class="logs-section">
        <h2 id="table-title">سجل العمليات المعروضة</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>التاريخ</th><th>البيان</th><th>النوع</th><th>المحفظة</th><th>المبلغ</th><th>العملة</th><th>إجراء</th></tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
    
    // جلب البيانات المحلية المخزنة في المتصفح فوراً
    let allTransactions = JSON.parse(localStorage.getItem('local_wallet_data')) || [];
    let currentFilter = 'all';

    const walletKeys = ['qnb', 'msct', 'cash', 'extra'];
    const currencies = ['ر.ع', 'ج.م', '$'];

    // دالة لتحديث الواجهة بالكامل
    function refreshUI() {
        calculateWalletBalances();
        filterReport(currentFilter);
    }

    // حساب أرصدة المحافظ الكلية المستقرة علوياً
    function calculateWalletBalances() {
        let walletBalances = {};
        walletKeys.forEach(w => { walletBalances[w] = {}; currencies.forEach(c => walletBalances[w][c] = 0); });

        allTransactions.forEach(t => {
            const amt = parseFloat(t.amount);
            const curr = t.currency || 'ر.ع';
            const wName = t.wallet.toLowerCase();
            if (t.type === 'إيراد' || (t.type === 'مديونية' && amt > 0)) {
                if(walletBalances[wName]) walletBalances[wName][curr] += amt;
            } else {
                if(walletBalances[wName]) walletBalances[wName][curr] -= amt;
            }
        });

        walletKeys.forEach(w => {
            const container = document.getElementById(`bal-${w}`);
            container.innerHTML = '';
            currencies.forEach(c => {
                if(walletBalances[w][c] !== 0 || allTransactions.some(t => t.wallet.toLowerCase() === w && t.currency === c)) {
                    container.innerHTML += `<div class="currency-line"><span>${c}</span><span>${walletBalances[w][c].toFixed(2)}</span></div>`;
                }
            });
            if(container.innerHTML === '') container.innerHTML = `<div class="currency-line"><span>ر.ع</span><span>0.00</span></div>`;
        });
    }

    // فرز وتصفية التقارير حسب الفاصل الزمني (يومي / شهري / كلي)
    function filterReport(range) {
        currentFilter = range;
        const todayStr = new Date().toISOString().split('T')[0];
        const currentMonthStr = todayStr.substring(0, 7);
        let filtered = [];

        if (range === 'today') {
            document.getElementById('report-title').innerText = `نوع التقرير الحالي: تقرير اليوم (${todayStr})`;
            document.getElementById('table-title').innerText = "حركات اليوم الحالية";
            filtered = allTransactions.filter(t => t.date === todayStr);
        } else if (range === 'month') {
            document.getElementById('report-title').innerText = `نوع التقرير الحالي: تقرير الشهر الحالي (${currentMonthStr})`;
            document.getElementById('table-title').innerText = "حركات الشهر الحالي";
            filtered = allTransactions.filter(t => t.date.startsWith(currentMonthStr));
        } else {
            document.getElementById('report-title').innerText = "نوع التقرير الحالي: كل البيانات التاريخية";
            document.getElementById('table-title').innerText = "سجل العمليات الكلية المعروضة";
            filtered = [...allTransactions];
        }

        // ترتيب الأحدث في الأعلى دائماً
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

        renderTableAndSummary(filtered);
    }

    // بناء الجدول والملخص المالي للتقرير
    function renderTableAndSummary(dataList) {
        const tbody = document.getElementById('logs-body');
        tbody.innerHTML = '';

        let totalIn = {}; let totalOut = {};
        currencies.forEach(c => { totalIn[c] = 0; totalOut[c] = 0; });

        dataList.forEach((t) => {
            const amt = parseFloat(t.amount);
            const curr = t.currency || 'ر.ع';

            if (t.type === 'إيراد' || (t.type === 'مديونية' && amt > 0)) {
                totalIn[curr] += amt;
            } else {
                totalOut[curr] += amt;
            }

            tbody.innerHTML += `<tr>
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td class="type-${t.type}">${t.type}</td>
                <td>${t.wallet.toUpperCase()}</td>
                <td>${amt.toFixed(2)}</td>
                <td><strong>${curr}</strong></td>
                <td><button class="delete-btn" onclick="deleteTransaction('${t.id}')">حذف</button></td>
            </tr>`;
        });

        // تحديث الصناديق التلخيصية للعملات
        const summaryContainer = document.getElementById('summary-container');
        summaryContainer.innerHTML = '';

        currencies.forEach(c => {
            if (totalIn[c] > 0 || totalOut[c] > 0) {
                const net = totalIn[c] - totalOut[c];
                const netColor = net >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                summaryContainer.innerHTML += `
                    <div class="summary-item">
                        <strong style="color: #67e8f9; display:block; margin-bottom:5px;">💰 العملة: ${c}</strong>
                        <div>إجمالي الإيراد: <span style="color:var(--accent-green)">+${totalIn[c].toFixed(2)}</span></div>
                        <div>إجمالي المصروف: <span style="color:var(--accent-red)">-${totalOut[c].toFixed(2)}</span></div>
                        <div style="margin-top:5px; border-top:1px solid #475569; padding-top:5px;">
                            الصافي: <span style="color:${netColor}; font-weight:bold;">${net.toFixed(2)}</span>
                        </div>
                    </div>`;
            }
        });

        if (summaryContainer.innerHTML === '') {
            summaryContainer.innerHTML = '<div style="color:#94a3b8; font-size:0.9rem;">لا توجد حركات مالية مسجلة في هذا النطاق.</div>';
        }
    }

    // إضافة حركة مالية جديدة وحفظها محلياً
    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const t = {
            id: 'id_' + Date.now() + Math.random().toString(36).substr(2, 4), // معرف فريد للحذف
            date: document.getElementById('date').value,
            description: document.getElementById('description').value,
            type: document.getElementById('type').value,
            wallet: document.getElementById('wallet').value,
            currency: document.getElementById('currency').value,
            amount: document.getElementById('amount').value
        };

        allTransactions.push(t);
        localStorage.setItem('local_wallet_data', JSON.stringify(allTransactions));

        document.getElementById('description').value = '';
        document.getElementById('amount').value = '';
        
        refreshUI();
    });

    // دالة حذف معاملة معينة
    function deleteTransaction(id) {
        if(confirm("هل أنت متأكد من حذف هذه المعاملة نهائياً؟")) {
            allTransactions = allTransactions.filter(t => t.id !== id);
            localStorage.setItem('local_wallet_data', JSON.stringify(allTransactions));
            refreshUI();
        }
    }

    // تحميل التقرير الحالي كملف Excel مبسط (CSV)
    function exportToCSV() {
        if(allTransactions.length === 0) {
            alert("لا توجد بيانات لتحميلها!");
            return;
        }
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "التاريخ,البيان,النوع,المحفظة,المبلغ,العملة\n";

        allTransactions.forEach(t => {
            csvContent += `"${t.date}","${t.description}","${t.type}","${t.wallet.toUpperCase()}",${t.amount},"${t.currency}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `تقرير_مالي_محلي_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // تشغيل التطبيق فور فتح الصفحة
    refreshUI();
</script>
</body>
</html>
