<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التقارير الفخم</title>
    <!-- تضمين مكتبة التصدير المفضلة والمستقرة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-glow: #00f0ff;
            --accent-bold: #ff0055;
            --bg-lux: #f4f6fa;
            --panel-bg: #ffffff;
            --3d-shadow: 4px 4px 0px #b0b8c9, -2px -2px 0px #ffffff;
            --btn-shadow: 3px 3px 0px #c2003f, inset 1px 1px 2px rgba(255,255,255,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-lux);
            margin: 0;
            padding: 20px;
        }

        /* لوحة التحكم الرئيسية - غنية بالمجسمات والشعارات */
        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 3px solid #333;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 8px 8px 0px #222;
            position: relative;
        }

        /* شارات وشعارات فخمة وجريئة */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px double #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand-logo {
            background: var(--accent-bold);
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            box-shadow: var(--btn-shadow);
            border: 2px solid #333;
            letter-spacing: 1px;
        }

        /* كثرة الأزرار والمفاتيح (Control Desk) */
        .control-desk {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #eef2f7;
            padding: 20px;
            border-radius: 12px;
            border: 2px inset #999;
        }

        /* أزرار مجسمة بارزة بألوان جريئة */
        .lux-button {
            background: var(--accent-bold);
            color: white;
            border: 2px solid #333;
            padding: 12px 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all 0.1s ease;
            text-align: center;
            font-size: 0.9rem;
        }

        .lux-button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #c2003f;
        }

        .lux-button.secondary {
            background: #00b0ff;
            box-shadow: 3px 3px 0px #007bb3;
        }

        .lux-button.success {
            background: #00e676;
            color: #111;
            box-shadow: 3px 3px 0px #00a352;
        }

        /* منطقة التقرير المستهدفة بالتصدير */
        #report-content {
            background: white;
            padding: 25px;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .report-header {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th, .data-table td {
            border: 2px solid #333;
            padding: 12px;
            text-align: right;
        }

        .data-table th {
            background-color: #f0f4f8;
            color: #111;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <!-- الهيدر والشعارات -->
    <div class="header-panel">
        <div class="brand-logo">✦ نظام المراقبة المتقدم ✦</div>
        <h2>مركز استخراج التقارير الذكي</h2>
    </div>

    <!-- كثرة الأزرار والمجسمات للتحكم -->
    <div class="control-desk">
        <button class="lux-button" onclick="alert('تصفية البيانات...')">🎛️ تصفية المتقدمة</button>
        <button class="lux-button secondary" onclick="alert('تحديث الاتصال...')">🔄 تحديث المؤشرات</button>
        <button class="lux-button secondary" onclick="alert('خيارات العرض...')">🛠️ تخصيص الأعمدة</button>
        <!-- زر التصدير بلون جريء ومميز -->
        <button class="lux-button success" id="export-btn" onclick="exportToPDF()">📥 تصدير PDF الفوري</button>
    </div>

    <!-- محتوى التقرير (الذي كان يظهر فارغاً) -->
    <div id="report-content">
        <div class="report-header">
            <h3>تقرير الأداء العام والإنتاجية</h3>
            <p>تاريخ الاستخراج: 17 يونيو 2026</p>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>المؤشر</th>
                    <th>القيمة المستهدفة</th>
                    <th>الحالة الحالية</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>كفاءة التصميم الرقمي</td>
                    <td>95%</td>
                    <td style="color: green; font-weight: bold;">98% (ممتاز)</td>
                </tr>
                <tr>
                    <td>استجابة الأزرار والمجسمات</td>
                    <td>100%</td>
                    <td style="color: green; font-weight: bold;">100% (مستقر)</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function exportToPDF() {
    const element = document.getElementById('report-content');
    const btn = document.getElementById('export-btn');
    
    // تغيير النص مؤقتاً لطمأنة المستخدم
    btn.innerText = "جاري المعالجة...";
    btn.disabled = true;

    // إعدادات تمنع تماماً ظهور الصفحة البيضاء الفارغة
    const opt = {
        margin:       10,
        filename:     'التقرير_الفخم_2026.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
            scale: 2,             // يرفع الجودة ويمنع الفراغات
            useCORS: true,        // لحل مشاكل الصور الخارجية إن وجدت
            logging: false,
            letterRendering: true
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // التنفيذ الفعلي مع معالجة الوعود (Promises) لضمان عدم التصدير قبل اكتمال الرندرة
    html2pdf().set(opt).from(element).save().then(() => {
        btn.innerText = "📥 تصدير PDF الفوري";
        btn.disabled = false;
    }).catch(err => {
        console.error("خطأ أثناء التصدير:", err);
        btn.innerText = "فشل التصدير!";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
