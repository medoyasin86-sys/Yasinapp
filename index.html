<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 0; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .container {
            width: 210mm; height: 297mm;
            position: relative;
        }
        .box-part {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 165mm; height: 150mm;
        }
        .back-panel {
            width: 100mm; height: 150mm;
            border: 2px dashed #000;
            position: absolute; left: 50mm;
            display: flex; align-items: center; justify-content: center;
        }
        .side-panel-left {
            width: 50mm; height: 150mm;
            border: 2px solid #000;
            position: absolute; left: 0;
        }
        .glue-tab {
            width: 15mm; height: 140mm;
            border: 1px solid #666;
            position: absolute; left: 150mm; top: 5mm;
            background: #f9f9f9;
            font-size: 10px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box-part">
            <div class="side-panel-left"><center>جانب أيسر (50x150)</center></div>
            <div class="back-panel"><b>اللوحة الخلفية (ب)</b></div>
            <div class="glue-tab"><br><br>منطقة<br>لاصق</div>
        </div>
    </div>
</body>
</html>
