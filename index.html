<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أجندة 2026-2027 الملكية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --paper-bg: #fdfaf3; /* لون ورق فاخر */
            --ink-color: #3d3d3d;
            --accent-gold: #a68b5a;
            --line-color: #e0ddd5;
            --sidebar-bg: #4a4036;
            --active-tab: #8c7851;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: #262626;
            font-family: 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية الأجندة - أبعاد iPad 10.2 */
        .agenda-wrapper {
            width: 1024px;
            height: 768px;
            background-color: var(--paper-bg);
            display: flex;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            border-left: 10px solid #362e26;
            border-radius: 4px;
        }

        /* التبويبات الجانبية التفاعلية */
        .tabs-nav {
            width: 70px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding-top: 30px;
            gap: 2px;
        }

        .tab {
            padding: 18px 5px;
            color: #d1c7b7;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            font-weight: bold;
            opacity: 0.8;
        }

        .tab:hover, .tab.active {
            background: var(--paper-bg);
            color: var(--active-tab);
            border-left: 4px solid var(--active-tab);
            opacity: 1;
        }

        /* محتوى الصفحة */
        .main-page {
            flex: 1;
            padding: 40px 60px;
            position: relative;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; /* تسطير كلاسيكي */
            line-height: 32px;
            overflow-y: auto;
        }

        /* زخارف: قصاصة ورقية */
        .washi-tape-top {
            position: absolute;
            top: 20px;
            left: 50px;
            width: 150px;
            height: 40px;
            background: rgba(166, 139, 90, 0.35);
            transform: rotate(2deg);
            z-index: 5;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 3px double var(--accent-gold);
            padding-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 3.2rem;
            color: var(--accent-gold);
        }

        .year-indicator {
            font-size: 1.2rem;
            color: #777;
            letter-spacing: 5px;
            margin-top: -10px;
        }

        /* الهيكل الشبكي للأقسام */
        .grid-layout {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 50px;
            min-height: 480px;
        }

        .section-title {
            color: var(--accent-gold);
            font-size: 1.6rem;
            border-right: 4px solid var(--accent-gold);
            padding-right: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: var(--ink-color);
            resize: none;
            line-height: 32px;
        }

        .widget-box {
            background: rgba(255,255,255,0.4);
            border: 1px solid var(--line-color);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        /* الختم الشمعي */
        .wax-seal {
            position: absolute;
            bottom: 50px;
            right: 60px;
            width: 100px;
            height: 100px;
            background: radial-gradient(#b03a2e, #801a10);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1c40f;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            transform: rotate(10deg);
            font-weight: bold;
            text-align: center;
            font-size: 0.9rem;
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #a0a0a0;
        }
    </style>
</head>
<body>

    <div class="agenda-wrapper">
        <nav class="tabs-nav">
            <div class="tab active" onclick="changeContent('main')">الرئيسية</div>
            <div class="tab" onclick="changeContent('2026')">عام 2026</div>
            <div class="tab" onclick="changeContent('2027')">عام 2027</div>
            <div class="tab" onclick="changeContent('thoughts')">الخواطر</div>
            <div class="tab" onclick="changeContent('plans')">المخططات</div>
        </nav>

        <main class="main-page">
            <div class="washi-tape-top"></div>
            
            <header>
                <h1 id="page-title">أجندة الخواطر والأفكار</h1>
                <div class="year-indicator" id="year-label">٢٠٢٦ — ٢٠٢٧</div>
            </header>

            <div class="grid-layout">
                <section>
                    <div class="section-title" id="section-head">فيضُ الخاطر ...</div>
                    <textarea id="main-input" placeholder="ابدأ الكتابة هنا..."></textarea>
                </section>

                <aside>
                    <div class="widget-box">
                        <strong style="color: var(--accent-gold);">نوايا اليوم:</strong>
                        <div style="height: 150px; margin-top: 10px; border-bottom: 1px dashed var(--line-color);"></div>
                    </div>
                    <div class="widget-box">
                        <strong style="color: var(--accent-gold);">أفكار عابرة:</strong>
                        <div style="height: 150px; margin-top: 10px;"></div>
                    </div>
                </aside>
            </div>

            <div class="wax-seal">حصري<br>٢٠٢٦-٢٠٢٧</div>
            <footer>مُصمم للاستخدام الرقمي والورقي الفاخر</footer>
        </main>
    </div>

    <script>
        function changeContent(type) {
            const title = document.getElementById('page-title');
            const sectionHead = document.getElementById('section-head');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            if(type === '2026') {
                title.innerText = 'مخطط عام ٢٠٢٦';
                sectionHead.innerText = 'أهداف السنة الجديدة';
            } else if(type === '2027') {
                title.innerText = 'رؤية عام ٢٠٢٧';
                sectionHead.innerText = 'طموحات مستقبلية';
            } else if(type === 'thoughts') {
                title.innerText = 'ركن الخواطر';
                sectionHead.innerText = 'تأملات حرة ...';
            } else if(type === 'plans') {
                title.innerText = 'مخططات حياتية';
                sectionHead.innerText = 'بناء المسار ...';
            } else {
                title.innerText = 'أجندة الخواطر والأفكار';
                sectionHead.innerText = 'فيضُ الخاطر ...';
            }
        }
    </script>
</body>
</html>
