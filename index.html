<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mo Yasin Personal Legacy 2026-2027</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --vintage-paper: #f4eee0; 
            --ink: #2b2b2b;
            --gold-leaf: #b38b4d;
            --leather: #3d342d;
            --notebook-lines: #d1c7ac;
        }

        body, html {
            margin: 0; padding: 0;
            background: #0f0f0f;
            font-family: 'Amiri', serif;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        .notebook-container {
            width: 1024px;
            height: 768px;
            background: var(--vintage-paper);
            display: flex;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            border-left: 20px solid var(--leather);
            border-radius: 4px;
        }

        /* التبويبات الجانبية الأنيقة */
        .tabs {
            width: 70px;
            background: var(--leather);
            display: flex;
            flex-direction: column;
            padding-top: 50px;
        }

        .tab {
            padding: 30px 0;
            color: #8c7d6b;
            text-align: center;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.4s;
            border-right: 5px solid transparent;
        }

        .tab.active {
            background: var(--vintage-paper);
            color: var(--gold-leaf);
            border-right: 5px solid var(--gold-leaf);
        }

        /* مساحة المحتوى */
        .page {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
            background-image: linear-gradient(var(--notebook-lines) 1px, transparent 1px);
            background-size: 100% 34px; /* تسطير احترافي مريح */
            line-height: 34px;
        }

        header {
            border-bottom: 2px solid var(--gold-leaf);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 10px;
        }

        h1 { margin: 0; color: var(--gold-leaf); font-size: 2.8rem; font-weight: 400; }

        /* سجل الإبداع المالي (Mo Yasin Classic) */
        .finance-section {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--gold-leaf);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { background: var(--gold-leaf); color: white; padding: 12px; font-weight: bold; }
        td { border: 1px solid var(--notebook-lines); height: 34px; padding: 0 15px; }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background: var(--leather);
            color: var(--gold-leaf);
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            border-radius: 2px;
        }

        /* مساحة الكتابة الحرة */
        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            color: var(--ink);
            resize: none;
            line-height: 34px;
        }

        .wax-seal {
            position: absolute; bottom: 40px; left: 40px;
            width: 100px; height: 100px;
            background: radial-gradient(#8b1a1a, #5c0a0a);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d4af37; transform: rotate(-12deg);
            box-shadow: 10px 10px 25px rgba(0,0,0,0.4);
            font-size: 0.9rem; text-align: center; font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="notebook-container">
        <nav class="tabs">
            <div class="tab active" onclick="view('diary')">خواطر ٢٠٢٦-٢٠٢٧</div>
            <div class="tab" onclick="view('finance')">سجل الإبداع المالي</div>
            <div class="tab" onclick="view('calendar')">تقويم السنتين</div>
        </nav>

        <main class="page" id="content">
            <!-- سيتم التبديل هنا -->
        </main>

        <div class="wax-seal">MO.<br>YASIN</div>
    </div>

    <script>
        function view(type) {
            const content = document.getElementById('content');
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if(type === 'diary') {
                content.innerHTML = `
                    <header>
                        <h1>فيضُ الخاطر اليومي</h1>
                        <span style="color:#888;">${new Date().toLocaleDateString('ar-EG')}</span>
                    </header>
                    <textarea placeholder="هنا تُحفظ الأسرار وتبنى الأحلام..."></textarea>
                `;
            } else if(type === 'finance') {
                content.innerHTML = `
                    <header>
                        <h1>كشف المصروفات والدخل</h1>
                        <span style="color:#888;">سجل الإبداع المالي</span>
                    </header>
                    <table class="finance-section">
                        <thead>
                            <tr>
                                <th>اليوم</th><th>التاريخ</th><th>البيان</th><th>دخل (+)</th><th>صرف (-)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Array(10).fill('<tr><td></td><td> / </td><td></td><td></td><td></td></tr>').join('')}
                        </tbody>
                    </table>
                    <div class="summary">
                        <div>إجمالي الدخل: ---</div>
                        <div>إجمالي المصاريف: ---</div>
                        <div style="color:white;">الصافي: ---</div>
                    </div>
                `;
            } else if(type === 'calendar') {
                content.innerHTML = `
                    <header>
                        <h1>بوصلة الزمن</h1>
                        <span style="color:#888;">٢٠٢٦ - ٢٠٢٧</span>
                    </header>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; text-align:center;">
                        ${['يناير','فبراير','مارس','أبريل','مايو','يونيو'].map(m => `
                            <div style="border:1px solid var(--gold-leaf); padding:10px;">
                                <strong style="color:var(--gold-leaf)">${m} ٢٠٢٦</strong>
                                <div style="font-size:12px; margin-top:5px; color:#666;">انقر لتحديد يوم...</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }
        // البداية
        view('diary');
    </script>
</body>
</html>
