<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Digital Planner 2026-2027</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --paper: #f9f6f0;
            --ink: #2c2c2c;
            --gold: #b59b6d;
            --sidebar: #3e3832;
            --tab-active: #b59b6d;
            --line: #e2ddd3;
        }

        body, html {
            margin: 0; padding: 0;
            background: #1a1a1a;
            font-family: 'Amiri', serif;
            height: 100%; overflow: hidden;
        }

        /* حاوية الأجندة - أبعاد 4:3 مثالية للآيباد */
        .planner-container {
            width: 1024px;
            height: 768px;
            margin: auto;
            display: flex;
            background: var(--paper);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 8px;
            overflow: hidden;
        }

        /* شريط التنقل الجانبي (Tabs) */
        .sidebar {
            width: 80px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-left: 2px solid var(--gold);
        }

        .nav-tab {
            width: 100%;
            padding: 15px 0;
            color: #dcd1be;
            text-align: center;
            font-size: 14px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: pointer;
            transition: 0.3s;
            border-right: 4px solid transparent;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .nav-tab:hover, .nav-tab.active {
            background: var(--paper);
            color: var(--ink);
            border-right: 4px solid var(--gold);
        }

        /* المحتوى الرئيسي */
        .content {
            flex: 1;
            padding: 30px 50px;
            position: relative;
            background-image: linear-gradient(var(--line) 1px, transparent 1px);
            background-size: 100% 30px;
            line-height: 30px;
            overflow-y: auto;
        }

        /* ترويسة الصفحة */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        .date-display { font-size: 2.5rem; color: var(--gold); font-weight: bold; }
        .planner-type { font-size: 1.2rem; color: #888; font-style: italic; }

        /* الأقسام الوظيفية (مثل Paperlike) */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            min-height: 500px;
        }

        .daily-entry {
            border-right: 1px solid var(--line);
            padding-right: 20px;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            line-height: 30px;
            color: var(--ink);
            resize: none;
        }

        .widgets-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget {
            background: rgba(181, 155, 109, 0.05);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 4px;
        }

        .widget-title {
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--gold);
        }

        /* الختم الكلاسيكي والقصاصات */
        .wax-seal {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 90px;
            height: 90px;
            background: radial-gradient(#a32a2a, #7a1f1f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            transform: rotate(-10deg);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
            z-index: 10;
        }

        .washi-tape {
            position: absolute;
            top: 15px;
            right: 10%;
            width: 120px;
            height: 30px;
            background: rgba(181, 155, 109, 0.4);
            transform: rotate(3deg);
            pointer-events: none;
        }

    </style>
</head>
<body>

<div class="planner-container">
    <!-- التبويبات الجانبية الاحترافية -->
    <nav class="sidebar">
        <div class="nav-tab active" onclick="nav('index')">الفهرس</div>
        <div class="nav-tab" onclick="nav('2026')">عام 2026</div>
        <div class="nav-tab" onclick="nav('2027')">عام 2027</div>
        <div class="nav-tab" onclick="nav('thoughts')">الخواطر</div>
        <div class="nav-tab" onclick="nav('life')">مخططات الحياة</div>
        <div class="nav-tab" onclick="nav('goals')">الأهداف</div>
    </nav>

    <!-- مساحة الصفحة -->
    <main class="content">
        <div class="washi-tape"></div>
        
        <header>
            <div class="date-display" id="main-title">الأجندة الرقمية الاحترافية</div>
            <div class="planner-type" id="sub-title">إصدار 2026-2027 الفاخر</div>
        </header>

        <div class="main-grid">
            <section class="daily-entry">
                <textarea id="editor" placeholder="اكتب أفكارك وخواطرك هنا..."></textarea>
            </section>

            <aside class="widgets-column">
                <div class="widget">
                    <div class="widget-title">مخطط الأولوية القصوى</div>
                    <div style="height: 100px; border-bottom: 1px solid var(--line);"></div>
                    <div style="height: 100px;"></div>
                </div>
                <div class="widget">
                    <div class="widget-title">مراقبة العادات اليومية</div>
                    <p style="font-size: 0.9rem; color: #666;">✓ القراءة<br>✓ الرياضة<br>✓ التأمل</p>
                </div>
            </aside>
        </div>

        <div class="wax-seal">إصدار<br>محدود</div>
    </main>
</div>

<script>
    function nav(page) {
        const title = document.getElementById('main-title');
        const sub = document.getElementById('sub-title');
        const editor = document.getElementById('editor');
        const tabs = document.querySelectorAll('.nav-tab');
        
        tabs.forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');

        switch(page) {
            case '2026':
                title.innerText = 'نظرة عامة 2026';
                sub.innerText = 'التقويم السنوي والمواعيد الكبرى';
                editor.placeholder = 'حدد أهدافك الرئيسية لعام 2026...';
                break;
            case '2027':
                title.innerText = 'رؤية عام 2027';
                sub.innerText = 'التخطيط المستقبلي بعيد المدى';
                editor.placeholder = 'أين ترى نفسك في نهاية 2027؟';
                break;
            case 'thoughts':
                title.innerText = 'فيض الخاطر';
                sub.innerText = 'مساحة حرة للكتابة الإبداعية';
                editor.placeholder = 'لا تتردد في كتابة كل ما يجول في خاطرك...';
                break;
            case 'life':
                title.innerText = 'مخططات حياتية';
                sub.innerText = 'توازن الجوانب الشخصية والعملية';
                editor.placeholder = 'الجانب الصحي، المالي، والاجتماعي...';
                break;
            default:
                title.innerText = 'الأجندة الرقمية الاحترافية';
                sub.innerText = 'إصدار 2026-2027 الفاخر';
        }
    }
</script>

</body>
</html>
