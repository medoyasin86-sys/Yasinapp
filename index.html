<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة الذكية - إدارة المصروفات</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--text-color);
        }

        /* شبكة المحافظ */
        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 4px solid var(--accent-blue);
        }

        .wallet-balance {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* النموذج */
        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* الجداول */
        .logs-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        .type-إيراد { color: var(--accent-green); }
        .type-مصروف { color: var(--accent-red); }
        .type-مديونية { color: #f59e0b; }
        .type-جمعية { color: #a855f7; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 داشبورد الحسابات الشخصية</h1>
    
    <!-- قسم المحافظ -->
    <div class="wallets-grid">
        <div class="wallet-card" style="border-color: #3b82f6;"><div>QNB</div><div class="wallet-balance" id="bal-qnb">0.00</div></div>
        <div class="wallet-card" style="border-color: #10b981;"><div>MSCT</div><div class="wallet-balance" id="bal-msct">0.00</div></div>
        <div class="wallet-card" style="border-color: #f59e0b;"><div>CASH</div><div class="wallet-balance" id="bal-cash">0.00</div></div>
        <div class="wallet-card" style="border-color: #a855f7;"><div>EXTRA</div><div class="wallet-balance" id="bal-extra">0.00</div></div>
    </div>

    <!-- قسم الإدخال -->
    <div class="form-section">
        <h2>اضافة معاملة جديدة</h2>
        <form id="finance-form">
            <div class="form-group">
                <label>التاريخ (حالي أو سابَق)</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>البيان / الوصف</label>
                <input type="text" id="description" placeholder="مثال: راتب، تسديد دين، قسط جمعية" required>
            </div>
            <div class="form-group">
                <label>نوع المعاملة</label>
                <select id="type">
                    <option value="إيراد">إيراد (دخل جديد)</option>
                    <option value="مصروف">مصروف</option>
                    <option value="مديونية">مديونية (قرض/سلف)</option>
                    <option value="جمعية">جمعية</option>
                </select>
            </div>
            <div class="form-group">
                <label>المحفظة المستهدفة</label>
                <select id="wallet">
                    <option value="qnb">QNB</option>
                    <option value="msct">MSCT</option>
                    <option value="cash">Cash</option>
                    <option value="extra">Extra</option>
                </select>
            </div>
            <div class="form-group">
                <label>المبلغ</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <button type="submit">حفظ العملية</button>
        </form>
    </div>

    <!-- سجل العمليات -->
    <div class="logs-section">
        <h2>سجل العمليات الأخيرة</h2>
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>البيان</th>
                    <th>النوع</th>
                    <th>المحفظة</th>
                    <th>المبلغ</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                <!-- العمليات تظهر هنا -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // تعيين تاريخ اليوم كقيمة افتراضية
    document.getElementById('date').valueAsDate = new Date();

    // مصفوفة لتخزين البيانات محلياً مؤقتاً
    let transactions = JSON.parse(localStorage.getItem('my_expenses')) || [];

    const balances = { qnb: 0, msct: 0, cash: 0, extra: 0 };

    function updateUI() {
        // إعادة تعيين الأرصدة
        for (let key in balances) balances[key] = 0;
        
        const tbody = document.getElementById('logs-body');
        tbody.innerHTML = '';

        // حساب الأرصدة وبناء الجدول
        transactions.forEach((t) => {
            const amt = parseFloat(t.amount);
            if (t.type === 'إيراد' || (t.type === 'مديونية' && amt > 0)) {
                balances[t.wallet] += amt;
            } else {
                balances[t.wallet] -= amt;
            }

            const row = `<tr>
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td class="type-${t.type}">${t.type}</td>
                <td>${t.wallet.toUpperCase()}</td>
                <td>${amt}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // تحديث مربعات المحافظ
        for (let key in balances) {
            document.getElementById(`bal-${key}`).innerText = balances[key].toFixed(2);
        }
    }

    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const transaction = {
            date: document.getElementById('date').value,
            description: document.getElementById('description').value,
            type: document.getElementById('type').value,
            wallet: document.getElementById('wallet').value,
            amount: document.getElementById('amount').value
        };

        transactions.push(transaction);
        localStorage.setItem('my_expenses', JSON.stringify(transactions));
        
        updateUI();
        document.getElementById('description').value = '';
        document.getElementById('amount').value = '';
    });

    // تشغيل التحديث عند فتح الصفحة
    updateUI();
</script>
</body>
</html>
